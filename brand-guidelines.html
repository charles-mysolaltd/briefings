  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

f2');\n  unicode-range: U+0100-02BA, U+02BD-02C5, U+02C7-02CC, U+02CE-02D7, U+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;\n}\n/* latin */\n@font-face {\n  font-family: 'DM Serif Display';\n  font-style: normal;\n  font-weight: 400;\n  font-display: swap;\n  src: url(\"587db367-5202-433d-a7d3-4926313c4651\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n<\u002Fstyle>\n\n<style>\n:root {\n  --sun: #F5A623;\n  --sun-dark: #D88A0F;\n  --sun-light: #FFF3DC;\n  --teal: #1A6B5A;\n  --teal-mid: #2E8B73;\n  --teal-light: #E0F2EE;\n  --slate: #1C2B2A;\n  --slate-mid: #3D4F4E;\n  --muted: #7A8E8C;\n  --off-white: #F8F6F1;\n  --paper: #FBFAF5;\n  --white: #FFFFFF;\n  --border: rgba(28,43,42,0.10);\n  --border-strong: rgba(28,43,42,0.18);\n  --r: 14px;\n}\n*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }\nhtml { scroll-behavior: smooth; }\nbody { font-family: 'DM Sans', sans-serif; background: var(--paper); color: var(--slate); line-height: 1.6; -webkit-font-smoothing: antialiased; }\n.serif { font-family: 'DM Serif Display', Georgia, serif; font-weight: 400; }\n.mono { font-family: 'DM Mono', ui-monospace, monospace; }\n\n/* ===== COVER ===== */\n.cover {\n  min-height: 100vh; padding: 64px;\n  background: var(--slate); color: var(--white);\n  display: grid; grid-template-rows: auto 1fr auto;\n  position: relative; overflow: hidden;\n}\n.cover::before {\n  content: ''; position: absolute; right: -160px; top: -160px;\n  width: 720px; height: 720px; border-radius: 50%;\n  background: radial-gradient(circle at 30% 30%, var(--sun) 0%, var(--sun) 38%, transparent 38%);\n  opacity: 0.18;\n}\n.cover::after {\n  content: ''; position: absolute; left: -120px; bottom: -180px;\n  width: 480px; height: 480px; border-radius: 50%;\n  background: var(--sun); opacity: 0.04;\n}\n.cover-top { display: flex; justify-content: space-between; align-items: center; position: relative; z-index: 2; }\n.cover-mark { display: flex; align-items: center; gap: 14px; }\n.cover-mark img { width: 44px; height: 44px; }\n.cover-mark .name { font-family: 'DM Serif Display', serif; font-size: 24px; }\n.cover-meta { display: flex; gap: 32px; font-size: 12px; letter-spacing: 0.12em; text-transform: uppercase; color: rgba(255,255,255,0.55); }\n\n.cover-mid { display: flex; flex-direction: column; justify-content: center; position: relative; z-index: 2; max-width: 900px; }\n.cover-eyebrow {\n  display: inline-flex; align-items: center; gap: 10px;\n  font-size: 12px; letter-spacing: 0.18em; text-transform: uppercase; color: var(--sun);\n  margin-bottom: 32px;\n}\n.cover-eyebrow::before { content: ''; width: 28px; height: 1px; background: var(--sun); }\n.cover h1 {\n  font-family: 'DM Serif Display', serif; font-size: 112px; line-height: 0.95;\n  letter-spacing: -0.03em; margin-bottom: 32px;\n}\n.cover h1 em { font-style: italic; color: var(--sun); }\n.cover-lede { font-size: 22px; max-width: 640px; color: rgba(255,255,255,0.72); line-height: 1.5; }\n\n.cover-bottom { display: flex; justify-content: space-between; align-items: flex-end; position: relative; z-index: 2; }\n.cover-bottom-block { font-size: 12px; color: rgba(255,255,255,0.55); letter-spacing: 0.08em; text-transform: uppercase; }\n.cover-bottom-block strong { display: block; color: var(--white); font-family: 'DM Serif Display', serif; font-size: 22px; letter-spacing: 0; text-transform: none; margin-top: 6px; }\n\n/* ===== PAGE/SECTION ===== */\nsection.page {\n  max-width: 1200px; margin: 0 auto; padding: 96px 64px;\n  border-top: 1px solid var(--border);\n}\nsection.page.dark { background: var(--slate); color: var(--white); max-width: none; padding: 96px 64px; border: none; }\nsection.page.dark .inner { max-width: 1200px; margin: 0 auto; }\nsection.page.tinted { background: var(--off-white); max-width: none; padding: 96px 64px; border: none; }\nsection.page.tinted .inner { max-width: 1200px; margin: 0 auto; }\nsection.page.sun { background: var(--sun-light); max-width: none; padding: 96px 64px; border: none; }\nsection.page.sun .inner { max-width: 1200px; margin: 0 auto; }\n\n.section-num {\n  display: flex; align-items: baseline; gap: 16px; margin-bottom: 8px;\n  font-family: 'DM Mono', monospace; font-size: 12px;\n  color: var(--teal); letter-spacing: 0.1em; text-transform: uppercase;\n}\nsection.page.dark .section-num { color: var(--sun); }\n.section-num span:first-child {\n  width: 32px; height: 32px; border-radius: 50%; border: 1px solid currentColor;\n  display: inline-flex; align-items: center; justify-content: center;\n}\n.section-title {\n  font-family: 'DM Serif Display', serif; font-size: 64px; line-height: 1.02;\n  letter-spacing: -0.02em; margin-bottom: 18px; max-width: 900px;\n}\n.section-lede {\n  font-size: 19px; color: var(--muted); max-width: 720px; line-height: 1.55; margin-bottom: 56px;\n}\nsection.page.dark .section-lede { color: rgba(255,255,255,0.6); }\n\n.h-rule { height: 1px; background: var(--border); margin: 56px 0; }\nsection.page.dark .h-rule { background: rgba(255,255,255,0.1); }\n\n/* ===== TOC ===== */\n.toc-section { padding: 96px 64px; max-width: 1200px; margin: 0 auto; border-top: 1px solid var(--border); }\n.toc { display: grid; grid-template-columns: repeat(2, 1fr); gap: 0 80px; }\n.toc-row {\n  display: grid; grid-template-columns: 36px 1fr auto;\n  gap: 16px; align-items: center;\n  padding: 22px 0; border-bottom: 1px solid var(--border);\n  font-size: 16px; color: var(--slate); text-decoration: none;\n}\n.toc-row:hover { color: var(--teal); }\n.toc-row .num { font-family: 'DM Mono', monospace; font-size: 12px; color: var(--muted); }\n.toc-row .title { font-family: 'DM Serif Display', serif; font-size: 22px; }\n.toc-row .pg { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--muted); letter-spacing: 0.1em; }\n\n/* ===== LOGO PAGE ===== */\n.logo-hero {\n  background: var(--off-white); border-radius: 20px;\n  padding: 80px; display: flex; align-items: center; justify-content: center;\n  margin-bottom: 48px; min-height: 360px;\n}\n.logo-hero img { max-width: 480px; height: auto; }\n.logo-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 24px; }\n.logo-tile {\n  border: 1px solid var(--border); border-radius: 16px; overflow: hidden;\n  background: var(--white);\n}\n.logo-tile.dark { background: var(--slate); border-color: transparent; }\n.logo-tile.sun-bg { background: var(--sun); border-color: transparent; }\n.logo-tile.teal-bg { background: var(--teal); border-color: transparent; }\n.logo-tile-canvas {\n  height: 220px; display: flex; align-items: center; justify-content: center; padding: 32px;\n}\n.logo-tile-canvas img { max-height: 120px; max-width: 100%; }\n.logo-tile-meta {\n  border-top: 1px solid var(--border); padding: 14px 20px;\n  display: flex; justify-content: space-between; align-items: center;\n  font-size: 12px;\n}\n.logo-tile.dark .logo-tile-meta, .logo-tile.sun-bg .logo-tile-meta, .logo-tile.teal-bg .logo-tile-meta {\n  border-top-color: rgba(255,255,255,0.1);\n}\n.logo-tile.dark .logo-tile-meta { color: rgba(255,255,255,0.6); }\n.logo-tile.sun-bg .logo-tile-meta { color: rgba(28,43,42,0.7); border-top-color: rgba(28,43,42,0.15); }\n.logo-tile.teal-bg .logo-tile-meta { color: rgba(255,255,255,0.7); }\n.logo-tile-meta .label { font-weight: 500; color: inherit; }\n.logo-tile-meta .file { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--muted); }\n.logo-tile.dark .logo-tile-meta .file { color: rgba(255,255,255,0.4); }\n.logo-tile.sun-bg .logo-tile-meta .file { color: rgba(28,43,42,0.55); }\n.logo-tile.teal-bg .logo-tile-meta .file { color: rgba(255,255,255,0.5); }\n\n/* ===== ANATOMY ===== */\n.anatomy {\n  position: relative; background: var(--off-white); border-radius: 20px;\n  padding: 80px 96px; margin-bottom: 32px;\n  display: flex; justify-content: center; align-items: center; min-height: 380px;\n}\n.anatomy-svg { width: 100%; max-width: 720px; }\n\n/* ===== CLEARSPACE / SIZING ===== */\n.spacing-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; }\n.demo-block {\n  background: var(--off-white); border-radius: 16px; padding: 48px;\n  display: flex; align-items: center; justify-content: center; min-height: 280px;\n  position: relative;\n}\n.demo-cap {\n  display: flex; justify-content: space-between; align-items: baseline;\n  margin-top: 14px; font-size: 13px; color: var(--muted);\n}\n.demo-cap strong { color: var(--slate); font-weight: 500; }\n\n/* ===== MISUSE ===== */\n.misuse-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; }\n.misuse-tile {\n  background: var(--off-white); border-radius: 14px; overflow: hidden;\n  border: 1px solid var(--border);\n}\n.misuse-canvas {\n  height: 180px; display: flex; align-items: center; justify-content: center;\n  padding: 24px; background: var(--white); position: relative;\n}\n.misuse-canvas .x-mark {\n  position: absolute; top: 12px; right: 12px;\n  width: 24px; height: 24px; border-radius: 50%; background: #C0392B;\n  color: white; font-size: 14px; display: flex; align-items: center; justify-content: center;\n  font-weight: 600;\n}\n.misuse-canvas img { max-height: 100px; }\n.misuse-cap { padding: 14px 18px; font-size: 13px; color: var(--slate); }\n.misuse-cap strong { display: block; color: #C0392B; font-size: 11px; letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 4px; }\n\n/* ===== COLOR ===== */\n.color-hero {\n  display: grid; grid-template-columns: 2fr 1fr 1fr; gap: 0;\n  border-radius: 20px; overflow: hidden; height: 320px; margin-bottom: 32px;\n}\n.color-hero > div { padding: 32px; display: flex; flex-direction: column; justify-content: space-between; }\n.color-hero .ch-name { font-family: 'DM Serif Display', serif; font-size: 32px; }\n.color-hero .ch-codes { font-family: 'DM Mono', monospace; font-size: 12px; line-height: 2; }\n\n.color-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-bottom: 20px; }\n.color-card {\n  border-radius: 14px; overflow: hidden; background: var(--white); border: 1px solid var(--border);\n}\n.color-swatch { height: 140px; }\n.color-meta { padding: 18px 20px; }\n.color-meta .name { font-family: 'DM Serif Display', serif; font-size: 20px; margin-bottom: 12px; }\n.color-meta .codes { font-family: 'DM Mono', monospace; font-size: 12px; color: var(--muted); line-height: 1.85; }\n.color-meta .codes div { display: flex; justify-content: space-between; }\n.color-meta .codes span:first-child { color: var(--slate-mid); }\n\n.color-pairings { background: var(--off-white); border-radius: 16px; padding: 32px; }\n.color-pairings h3 { font-family: 'DM Serif Display', serif; font-size: 22px; margin-bottom: 20px; }\n.pair-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; }\n.pair {\n  border-radius: 10px; padding: 28px 20px; height: 120px;\n  display: flex; flex-direction: column; justify-content: space-between;\n  font-size: 13px;\n}\n.pair .pair-text { font-family: 'DM Serif Display', serif; font-size: 22px; line-height: 1.1; }\n.pair .pair-meta { font-family: 'DM Mono', monospace; font-size: 10px; opacity: 0.75; letter-spacing: 0.06em; text-transform: uppercase; }\n\n/* ===== TYPOGRAPHY ===== */\n.type-hero {\n  background: var(--off-white); border-radius: 20px; padding: 64px;\n  margin-bottom: 32px;\n}\n.type-display {\n  font-family: 'DM Serif Display', serif; font-size: 144px; line-height: 0.95;\n  letter-spacing: -0.03em;\n}\n.type-display em { font-style: italic; color: var(--teal); }\n.type-mini {\n  display: flex; gap: 32px; flex-wrap: wrap; margin-top: 32px;\n  font-family: 'DM Mono', monospace; font-size: 11px; color: var(--muted); letter-spacing: 0.1em; text-transform: uppercase;\n}\n\n.type-stack { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; }\n.type-card {\n  border: 1px solid var(--border); border-radius: 16px; padding: 32px; background: var(--white);\n}\n.type-card h4 { font-size: 12px; font-family: 'DM Mono', monospace; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); margin-bottom: 20px; }\n.type-card .specimen { margin-bottom: 24px; }\n.type-card .specimen.serif { font-family: 'DM Serif Display', serif; font-size: 56px; line-height: 1; letter-spacing: -0.02em; }\n.type-card .specimen.sans { font-family: 'DM Sans', sans-serif; font-size: 56px; font-weight: 500; line-height: 1; letter-spacing: -0.03em; }\n.type-card .glyphs { font-family: 'DM Sans', sans-serif; font-size: 13px; color: var(--muted); margin-bottom: 18px; letter-spacing: 0.02em; line-height: 1.7; }\n.type-card.serif-card .glyphs { font-family: 'DM Serif Display', serif; font-size: 16px; }\n.type-card .specs { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--slate-mid); line-height: 1.9; }\n.type-card .specs div { display: flex; justify-content: space-between; border-top: 1px solid var(--border); padding-top: 6px; }\n.type-card .specs div:first-child { border-top: none; padding-top: 0; }\n\n.scale-table { width: 100%; border-collapse: collapse; }\n.scale-table tr { border-bottom: 1px solid var(--border); }\n.scale-table tr:last-child { border-bottom: none; }\n.scale-table td { padding: 18px 0; vertical-align: baseline; }\n.scale-table td:first-child { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--muted); letter-spacing: 0.08em; text-transform: uppercase; width: 120px; }\n.scale-table td:nth-child(2) { color: var(--slate); }\n.scale-table td:last-child { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--muted); width: 200px; text-align: right; }\n\n/* ===== VOICE ===== */\n.voice-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 32px; margin-bottom: 56px; }\n.voice-card {\n  background: var(--white); border: 1px solid var(--border); border-radius: 16px; padding: 32px;\n}\n.voice-card h3 { font-family: 'DM Serif Display', serif; font-size: 26px; margin-bottom: 16px; }\n.voice-pillars { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-bottom: 56px; }\n.pillar {\n  background: var(--off-white); border-radius: 14px; padding: 28px;\n  border-top: 3px solid var(--teal);\n}\n.pillar h4 { font-family: 'DM Serif Display', serif; font-size: 22px; margin-bottom: 8px; }\n.pillar p { font-size: 13px; color: var(--muted); line-height: 1.6; }\n.pillar:nth-child(2) { border-top-color: var(--sun); }\n.pillar:nth-child(3) { border-top-color: var(--slate); }\n.pillar:nth-child(4) { border-top-color: var(--teal-mid); }\n\n.do-dont-table { width: 100%; border-collapse: collapse; }\n.do-dont-table th { text-align: left; padding: 14px 16px; font-size: 11px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; color: var(--muted); border-bottom: 1px solid var(--border-strong); }\n.do-dont-table th:nth-child(2) { color: var(--teal); }\n.do-dont-table th:nth-child(3) { color: #C0392B; }\n.do-dont-table td { padding: 16px; border-bottom: 1px solid var(--border); vertical-align: top; font-size: 14px; line-height: 1.6; }\n.do-dont-table tr:last-child td { border-bottom: none; }\n.do-dont-table td:first-child { font-family: 'DM Mono', monospace; font-size: 11px; letter-spacing: 0.06em; text-transform: uppercase; color: var(--muted); width: 160px; }\n.do-dont-table td.do { color: var(--teal); font-weight: 500; }\n.do-dont-table td.dont { color: #C0392B; font-style: italic; }\n\n/* ===== ICONS ===== */\n.icon-grid { display: grid; grid-template-columns: repeat(6, 1fr); gap: 16px; }\n.icon-tile {\n  background: var(--white); border: 1px solid var(--border); border-radius: 14px;\n  aspect-ratio: 1; display: flex; flex-direction: column; align-items: center; justify-content: center;\n  padding: 20px; gap: 10px;\n}\n.icon-tile svg { width: 36px; height: 36px; }\n.icon-tile span { font-size: 11px; color: var(--muted); }\n\n/* ===== PATTERNS ===== */\n.pattern-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; }\n.pattern-tile {\n  border-radius: 16px; overflow: hidden; aspect-ratio: 1;\n  background-size: cover; background-position: center;\n}\n\n/* ===== BADGES ===== */\n.badge-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; }\n.badge-display {\n  background: var(--off-white); border-radius: 14px; padding: 32px;\n  display: flex; flex-direction: column; align-items: center; gap: 16px;\n}\n.badge-display img { max-width: 100%; }\n.badge-display .label { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--muted); letter-spacing: 0.08em; text-transform: uppercase; }\n\n/* ===== APPLICATIONS ===== */\n.apps-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 32px; }\n.app-card {\n  background: var(--off-white); border-radius: 20px; overflow: hidden;\n  border: 1px solid var(--border);\n}\n.app-card .app-cap {\n  padding: 18px 24px; border-top: 1px solid var(--border);\n  display: flex; justify-content: space-between; align-items: center; background: var(--white);\n}\n.app-card .app-cap strong { font-size: 14px; }\n.app-card .app-cap span { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--muted); letter-spacing: 0.06em; text-transform: uppercase; }\n\n/* business card */\n.bizcard { padding: 56px; display: flex; align-items: center; justify-content: center; min-height: 360px; }\n.bc {\n  width: 360px; height: 220px; border-radius: 12px; padding: 24px;\n  display: flex; flex-direction: column; justify-content: space-between;\n  box-shadow: 0 24px 60px rgba(28,43,42,0.18);\n}\n.bc.front { background: var(--slate); color: var(--white); }\n.bc.back { background: var(--sun); color: var(--slate); }\n.bc-top { display: flex; align-items: center; gap: 10px; }\n.bc-top img { width: 28px; height: 28px; }\n.bc-top span { font-family: 'DM Serif Display', serif; font-size: 22px; }\n.bc.front .bc-top span { color: var(--white); }\n.bc-name { font-family: 'DM Serif Display', serif; font-size: 22px; line-height: 1.1; }\n.bc-role { font-size: 12px; opacity: 0.7; margin-top: 2px; }\n.bc-contact { font-family: 'DM Mono', monospace; font-size: 11px; line-height: 1.8; opacity: 0.85; }\n.bc-tag {\n  font-family: 'DM Serif Display', serif; font-size: 32px; line-height: 1;\n}\n.bc-tag em { font-style: italic; }\n\n/* social ig */\n.ig-mock { padding: 32px; display: flex; align-items: center; justify-content: center; min-height: 480px; background: linear-gradient(135deg, #FFF3DC 0%, #E0F2EE 100%); }\n.ig-frame {\n  width: 320px; aspect-ratio: 4/5; background: var(--slate);\n  border-radius: 16px; padding: 28px; color: white;\n  display: flex; flex-direction: column; justify-content: space-between;\n  position: relative; overflow: hidden;\n}\n.ig-frame::before {\n  content: ''; position: absolute; top: -60px; right: -60px; width: 200px; height: 200px;\n  border-radius: 50%; background: var(--sun); opacity: 0.85;\n}\n.ig-top { font-family: 'DM Mono', monospace; font-size: 10px; color: var(--sun); letter-spacing: 0.18em; text-transform: uppercase; position: relative; z-index: 1; }\n.ig-headline { font-family: 'DM Serif Display', serif; font-size: 38px; line-height: 1; letter-spacing: -0.02em; position: relative; z-index: 1; }\n.ig-headline em { color: var(--sun); font-style: italic; }\n.ig-bottom { display: flex; justify-content: space-between; align-items: flex-end; position: relative; z-index: 1; }\n.ig-bottom img { width: 28px; height: 28px; }\n.ig-handle { font-size: 11px; opacity: 0.7; }\n\n/* poster */\n.poster-mock { padding: 40px; display: flex; align-items: center; justify-content: center; min-height: 480px; background: var(--slate); }\n.poster {\n  width: 280px; aspect-ratio: 2/3; background: var(--sun-light); border-radius: 8px;\n  padding: 28px; display: flex; flex-direction: column; justify-content: space-between;\n  position: relative; overflow: hidden;\n}\n.poster-sun { position: absolute; top: -40px; left: 50%; transform: translateX(-50%); width: 240px; height: 240px; border-radius: 50%; background: var(--sun); }\n.poster-content { position: relative; z-index: 1; margin-top: 180px; }\n.poster-content h3 { font-family: 'DM Serif Display', serif; font-size: 32px; line-height: 0.95; letter-spacing: -0.02em; color: var(--slate); }\n.poster-content h3 em { color: var(--teal); font-style: italic; }\n.poster-foot { position: relative; z-index: 1; display: flex; justify-content: space-between; align-items: flex-end; }\n.poster-foot img { width: 28px; height: 28px; }\n.poster-foot .price { font-family: 'DM Serif Display', serif; font-size: 24px; color: var(--slate); }\n.poster-foot .price small { font-size: 11px; font-family: 'DM Sans', sans-serif; color: var(--slate-mid); }\n\n/* email tile */\n.email-mock { padding: 32px; min-height: 480px; background: var(--off-white); display: flex; align-items: center; justify-content: center; }\n.email-frame {\n  width: 320px; background: var(--white); border-radius: 12px; overflow: hidden;\n  box-shadow: 0 18px 40px rgba(28,43,42,0.12);\n}\n.email-header { background: var(--slate); padding: 20px 24px; display: flex; align-items: center; gap: 10px; }\n.email-header img { width: 24px; height: 24px; }\n.email-header span { font-family: 'DM Serif Display', serif; color: white; font-size: 18px; }\n.email-body { padding: 28px 24px; }\n.email-body h4 { font-family: 'DM Serif Display', serif; font-size: 24px; line-height: 1.1; margin-bottom: 12px; }\n.email-body h4 em { font-style: italic; color: var(--teal); }\n.email-body p { font-size: 12px; color: var(--muted); line-height: 1.6; margin-bottom: 18px; }\n.email-cta {\n  background: var(--teal); color: white; padding: 10px 18px; border-radius: 100px;\n  font-size: 12px; display: inline-block;\n}\n.email-foot { background: var(--off-white); padding: 16px 24px; font-size: 10px; color: var(--muted); font-family: 'DM Mono', monospace; }\n\n/* ===== FOOTER ===== */\n.brand-footer {\n  background: var(--slate); color: var(--white); padding: 80px 64px 56px;\n}\n.brand-footer-inner { max-width: 1200px; margin: 0 auto; }\n.footer-tagline { font-family: 'DM Serif Display', serif; font-size: 56px; line-height: 1; letter-spacing: -0.02em; margin-bottom: 56px; max-width: 800px; }\n.footer-tagline em { font-style: italic; color: var(--sun); }\n.footer-grid { display: grid; grid-template-columns: 2fr 1fr 1fr; gap: 64px; padding-top: 40px; border-top: 1px solid rgba(255,255,255,0.1); }\n.footer-grid h5 { font-size: 11px; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; color: rgba(255,255,255,0.4); margin-bottom: 16px; }\n.footer-grid p, .footer-grid li { font-size: 13px; color: rgba(255,255,255,0.7); line-height: 1.8; list-style: none; }\n.footer-bottom { display: flex; justify-content: space-between; padding-top: 32px; margin-top: 56px; border-top: 1px solid rgba(255,255,255,0.1); font-family: 'DM Mono', monospace; font-size: 11px; color: rgba(255,255,255,0.4); letter-spacing: 0.06em; text-transform: uppercase; }\n\n@media (max-width: 900px) {\n  section.page, .toc-section, section.page.dark, section.page.tinted, section.page.sun { padding: 64px 24px; }\n  section.page.dark .inner, section.page.tinted .inner, section.page.sun .inner { padding: 0; }\n  .cover { padding: 32px 24px; }\n  .cover h1 { font-size: 64px; }\n  .section-title { font-size: 40px; }\n  .toc, .logo-grid, .spacing-grid, .voice-grid, .apps-grid, .pair-row, .footer-grid, .type-stack, .color-row, .color-hero, .pattern-row, .badge-row { grid-template-columns: 1fr !important; }\n  .icon-grid, .misuse-grid { grid-template-columns: repeat(3, 1fr) !important; }\n  .voice-pillars { grid-template-columns: 1fr 1fr; }\n  .type-display { font-size: 72px; }\n  .footer-tagline { font-size: 36px; }\n}\n<\u002Fstyle>\n<\u002Fhead>\n<body>\n\n<!-- COVER -->\n<section class=\"cover\">\n  <div class=\"cover-top\">\n    <div class=\"cover-mark\">\n      <img src=\"b614945d-f0fd-49aa-a363-e87d08ec75f9\" alt=\"Sola\">\n      <span class=\"name\">Sola<\u002Fspan>\n    <\u002Fdiv>\n    <div class=\"cover-meta\">\n      <span>Brand Guidelines<\u002Fspan>\n      <span>v1.0 · 2026<\u002Fspan>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <div class=\"cover-mid\">\n    <div class=\"cover-eyebrow\">The Sola Brand Book<\u002Fdiv>\n    <h1>Sun in a <em>box.<\u002Fem><\u002Fh1>\n    <p class=\"cover-lede\">A practical, no-nonsense identity for the company helping the UK plug into its own balcony. This document covers logo, colour, type, voice, iconography, patterns and brand applications.<\u002Fp>\n  <\u002Fdiv>\n  <div class=\"cover-bottom\">\n    <div class=\"cover-bottom-block\">\n      Issued <strong>April 2026<\u002Fstrong>\n    <\u002Fdiv>\n    <div class=\"cover-bottom-block\">\n      Maintained by <strong>The Sola brand team<\u002Fstrong>\n    <\u002Fdiv>\n    <div class=\"cover-bottom-block\">\n      For questions <strong>brand@sola.co.uk<\u002Fstrong>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- TOC -->\n<div class=\"toc-section\">\n  <div class=\"section-num\"><span>00<\u002Fspan><span>Contents<\u002Fspan><\u002Fdiv>\n  <h2 class=\"section-title\">What's inside.<\u002Fh2>\n  <div class=\"toc\">\n    <a href=\"#logo\" class=\"toc-row\"><span class=\"num\">01<\u002Fspan><span class=\"title\">Logo system<\u002Fspan><span class=\"pg\">P. 04<\u002Fspan><\u002Fa>\n    <a href=\"#color\" class=\"toc-row\"><span class=\"num\">02<\u002Fspan><span class=\"title\">Colour<\u002Fspan><span class=\"pg\">P. 09<\u002Fspan><\u002Fa>\n    <a href=\"#type\" class=\"toc-row\"><span class=\"num\">03<\u002Fspan><span class=\"title\">Typography<\u002Fspan><span class=\"pg\">P. 13<\u002Fspan><\u002Fa>\n    <a href=\"#voice\" class=\"toc-row\"><span class=\"num\">04<\u002Fspan><span class=\"title\">Voice &amp; tone<\u002Fspan><span class=\"pg\">P. 17<\u002Fspan><\u002Fa>\n    <a href=\"#icons\" class=\"toc-row\"><span class=\"num\">05<\u002Fspan><span class=\"title\">Iconography<\u002Fspan><span class=\"pg\">P. 21<\u002Fspan><\u002Fa>\n    <a href=\"#patterns\" class=\"toc-row\"><span class=\"num\">06<\u002Fspan><span class=\"title\">Patterns &amp; texture<\u002Fspan><span class=\"pg\">P. 23<\u002Fspan><\u002Fa>\n    <a href=\"#badges\" class=\"toc-row\"><span class=\"num\">07<\u002Fspan><span class=\"title\">Trust badges<\u002Fspan><span class=\"pg\">P. 25<\u002Fspan><\u002Fa>\n    <a href=\"#applications\" class=\"toc-row\"><span class=\"num\">08<\u002Fspan><span class=\"title\">Applications<\u002Fspan><span class=\"pg\">P. 27<\u002Fspan><\u002Fa>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<!-- 01 LOGO -->\n<section class=\"page\" id=\"logo\">\n  <div class=\"section-num\"><span>01<\u002Fspan><span>Logo system<\u002Fspan><\u002Fdiv>\n  <h2 class=\"section-title\">A sun. A panel. A word.<\u002Fh2>\n  <p class=\"section-lede\">The Sola mark is a sun with a small dark square at its centre — the panel inside the box. Eight subtle rays sit around it, set quietly so the mark feels grounded, not loud. The wordmark is set in DM Serif Display, italic-friendly, slightly tightened.<\u002Fp>\n\n  <div class=\"logo-hero\">\n    <img src=\"09d818af-db95-4328-97e0-8b986c16c6be\" alt=\"Sola primary lockup\">\n  <\u002Fdiv>\n\n  <div class=\"logo-grid\">\n    <div class=\"logo-tile\">\n      <div class=\"logo-tile-canvas\"><img src=\"09d818af-db95-4328-97e0-8b986c16c6be\" alt=\"\"><\u002Fdiv>\n      <div class=\"logo-tile-meta\"><span class=\"label\">Primary lockup<\u002Fspan><span class=\"file\">logo-primary.svg<\u002Fspan><\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"logo-tile\">\n      <div class=\"logo-tile-canvas\"><img src=\"7154de3f-09c2-40e1-9b84-34f501fbd98a\" alt=\"\"><\u002Fdiv>\n      <div class=\"logo-tile-meta\"><span class=\"label\">Stacked lockup<\u002Fspan><span class=\"file\">logo-stacked.svg<\u002Fspan><\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"logo-tile dark\">\n      <div class=\"logo-tile-canvas\"><img src=\"230920a7-3fb2-46b4-9283-08ebafd81967\" alt=\"\"><\u002Fdiv>\n      <div class=\"logo-tile-meta\"><span class=\"label\" style=\"color:white\">Reversed<\u002Fspan><span class=\"file\">logo-reversed.svg<\u002Fspan><\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"logo-tile\">\n      <div class=\"logo-tile-canvas\"><img src=\"62aeb439-c242-44cc-84f5-42367747bebe\" alt=\"\" style=\"max-height: 96px\"><\u002Fdiv>\n      <div class=\"logo-tile-meta\"><span class=\"label\">Logomark<\u002Fspan><span class=\"file\">logomark.svg<\u002Fspan><\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"logo-tile dark\">\n      <div class=\"logo-tile-canvas\"><img src=\"b614945d-f0fd-49aa-a363-e87d08ec75f9\" alt=\"\" style=\"max-height: 96px\"><\u002Fdiv>\n      <div class=\"logo-tile-meta\"><span class=\"label\" style=\"color:white\">Mono on slate<\u002Fspan><span class=\"file\">logomark-mono-dark.svg<\u002Fspan><\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"logo-tile\">\n      <div class=\"logo-tile-canvas\"><img src=\"16d9e128-6eb6-4238-be36-c37900f19d7c\" alt=\"\" style=\"max-height: 96px\"><\u002Fdiv>\n      <div class=\"logo-tile-meta\"><span class=\"label\">Outline (single colour print)<\u002Fspan><span class=\"file\">logomark-outline.svg<\u002Fspan><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div class=\"h-rule\"><\u002Fdiv>\n\n  <h3 class=\"serif\" style=\"font-size: 32px; margin-bottom: 24px\">Anatomy &amp; clear space.<\u002Fh3>\n  <div class=\"anatomy\">\n    <svg class=\"anatomy-svg\" viewBox=\"0 0 720 320\" xmlns=\"http://www.w3.org/2000/svg\">\n      <!-- clearspace box -->\n      <rect x=\"20\" y=\"40\" width=\"680\" height=\"240\" fill=\"none\" stroke=\"#1A6B5A\" stroke-width=\"1\" stroke-dasharray=\"4 4\" opacity=\"0.6\"><\u002Frect>\n      <!-- x measure boxes -->\n      <rect x=\"20\" y=\"40\" width=\"40\" height=\"40\" fill=\"none\" stroke=\"#1A6B5A\" stroke-width=\"1\" opacity=\"0.5\"><\u002Frect>\n      <rect x=\"660\" y=\"40\" width=\"40\" height=\"40\" fill=\"none\" stroke=\"#1A6B5A\" stroke-width=\"1\" opacity=\"0.5\"><\u002Frect>\n      <rect x=\"20\" y=\"240\" width=\"40\" height=\"40\" fill=\"none\" stroke=\"#1A6B5A\" stroke-width=\"1\" opacity=\"0.5\"><\u002Frect>\n      <rect x=\"660\" y=\"240\" width=\"40\" height=\"40\" fill=\"none\" stroke=\"#1A6B5A\" stroke-width=\"1\" opacity=\"0.5\"><\u002Frect>\n      <text x=\"40\" y=\"68\" font-family=\"DM Mono, monospace\" font-size=\"11\" fill=\"#1A6B5A\" text-anchor=\"middle\">x<\u002Ftext>\n\n      <!-- the logo -->\n      <g transform=\"translate(140, 110)\">\n        <circle cx=\"40\" cy=\"40\" r=\"28\" fill=\"#F5A623\"><\u002Fcircle>\n        <g stroke=\"#1C2B2A\" stroke-width=\"2\" stroke-linecap=\"round\" opacity=\"0.25\">\n          <line x1=\"40\" y1=\"6\" x2=\"40\" y2=\"2\"><\u002Fline>\n          <line x1=\"40\" y1=\"74\" x2=\"40\" y2=\"78\"><\u002Fline>\n          <line x1=\"6\" y1=\"40\" x2=\"2\" y2=\"40\"><\u002Fline>\n          <line x1=\"74\" y1=\"40\" x2=\"78\" y2=\"40\"><\u002Fline>\n          <line x1=\"15.7\" y1=\"15.7\" x2=\"13.0\" y2=\"13.0\"><\u002Fline>\n          <line x1=\"64.3\" y1=\"64.3\" x2=\"67.0\" y2=\"67.0\"><\u002Fline>\n          <line x1=\"64.3\" y1=\"15.7\" x2=\"67.0\" y2=\"13.0\"><\u002Fline>\n          <line x1=\"15.7\" y1=\"64.3\" x2=\"13.0\" y2=\"67.0\"><\u002Fline>\n        <\u002Fg>\n        <circle cx=\"40\" cy=\"40\" r=\"14\" fill=\"#1C2B2A\" opacity=\"0.12\"><\u002Fcircle>\n        <text x=\"90\" y=\"54\" font-family=\"DM Serif Display, serif\" font-size=\"42\" fill=\"#1C2B2A\" letter-spacing=\"-0.5\">Sola<\u002Ftext>\n      <\u002Fg>\n\n      <!-- callouts -->\n      <g font-family=\"DM Mono, monospace\" font-size=\"10\" fill=\"#3D4F4E\" letter-spacing=\"0.08em\">\n        <text x=\"220\" y=\"40\" text-anchor=\"middle\">CLEAR SPACE = X (HEIGHT OF MARK ÷ 8)<\u002Ftext>\n\n        <line x1=\"180\" y1=\"120\" x2=\"240\" y2=\"90\" stroke=\"#3D4F4E\" stroke-width=\"0.5\"><\u002Fline>\n        <text x=\"244\" y=\"92\">Outer rays — set at 0.25 opacity<\u002Ftext>\n\n        <line x1=\"180\" y1=\"160\" x2=\"240\" y2=\"180\" stroke=\"#3D4F4E\" stroke-width=\"0.5\"><\u002Fline>\n        <text x=\"244\" y=\"184\">Centre square — the panel inside the box<\u002Ftext>\n\n        <line x1=\"290\" y1=\"170\" x2=\"330\" y2=\"220\" stroke=\"#3D4F4E\" stroke-width=\"0.5\"><\u002Fline>\n        <text x=\"334\" y=\"223\">Wordmark — DM Serif Display, ‑0.5 tracking<\u002Ftext>\n      <\u002Fg>\n    <\u002Fsvg>\n  <\u002Fdiv>\n\n  <div class=\"spacing-grid\">\n    <div>\n      <div class=\"demo-block\">\n        <div style=\"position:relative\">\n          <img src=\"62aeb439-c242-44cc-84f5-42367747bebe\" style=\"width: 24px\" alt=\"\">\n          <div style=\"position:absolute;top:-12px;left:-12px;width:48px;height:48px;border:1px dashed var(--teal);border-radius:50%;opacity:0.5\"><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"demo-cap\"><strong>Minimum size — digital<\u002Fstrong><span>24 px / 6 mm<\u002Fspan><\u002Fdiv>\n    <\u002Fdiv>\n    <div>\n      <div class=\"demo-block\">\n        <div style=\"position:relative\">\n          <img src=\"09d818af-db95-4328-97e0-8b986c16c6be\" style=\"width: 80px\" alt=\"\">\n          <div style=\"position:absolute;top:-8px;left:-8px;width:96px;height:36px;border:1px dashed var(--teal);border-radius:6px;opacity:0.5\"><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"demo-cap\"><strong>Minimum size — print<\u002Fstrong><span>20 mm wordmark width<\u002Fspan><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div class=\"h-rule\"><\u002Fdiv>\n\n  <h3 class=\"serif\" style=\"font-size: 32px; margin-bottom: 24px\">Misuse.<\u002Fh3>\n  <p class=\"section-lede\" style=\"margin-bottom: 32px\">The mark is built to be quiet and dependable. Don't dress it up.<\u002Fp>\n  <div class=\"misuse-grid\">\n    <div class=\"misuse-tile\">\n      <div class=\"misuse-canvas\">\n        <span class=\"x-mark\">×<\u002Fspan>\n        <img src=\"09d818af-db95-4328-97e0-8b986c16c6be\" style=\"transform: rotate(-12deg)\">\n      <\u002Fdiv>\n      <div class=\"misuse-cap\"><strong>Don't<\u002Fstrong>Rotate or tilt the mark.<\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"misuse-tile\">\n      <div class=\"misuse-canvas\" style=\"background: linear-gradient(135deg, #FF00CC, #3300FF)\">\n        <span class=\"x-mark\">×<\u002Fspan>\n        <img src=\"09d818af-db95-4328-97e0-8b986c16c6be\">\n      <\u002Fdiv>\n      <div class=\"misuse-cap\"><strong>Don't<\u002Fstrong>Place on busy or off-brand colours.<\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"misuse-tile\">\n      <div class=\"misuse-canvas\">\n        <span class=\"x-mark\">×<\u002Fspan>\n        <img src=\"09d818af-db95-4328-97e0-8b986c16c6be\" style=\"transform: scaleY(0.55)\">\n      <\u002Fdiv>\n      <div class=\"misuse-cap\"><strong>Don't<\u002Fstrong>Stretch, squash or distort.<\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"misuse-tile\">\n      <div class=\"misuse-canvas\">\n        <span class=\"x-mark\">×<\u002Fspan>\n        <img src=\"09d818af-db95-4328-97e0-8b986c16c6be\" style=\"filter: drop-shadow(0 6px 14px rgba(0,0,0,0.6))\">\n      <\u002Fdiv>\n      <div class=\"misuse-cap\"><strong>Don't<\u002Fstrong>Add shadows, glows or 3D effects.<\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"misuse-tile\">\n      <div class=\"misuse-canvas\">\n        <span class=\"x-mark\">×<\u002Fspan>\n        <div style=\"display:flex;align-items:center;gap:8px\"><img src=\"62aeb439-c242-44cc-84f5-42367747bebe\" style=\"width: 48px\"><span style=\"font-family: 'Comic Sans MS', cursive; font-size: 28px; color: var(--slate)\">Sola<\u002Fspan><\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"misuse-cap\"><strong>Don't<\u002Fstrong>Substitute the wordmark typeface.<\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"misuse-tile\">\n      <div class=\"misuse-canvas\">\n        <span class=\"x-mark\">×<\u002Fspan>\n        <img src=\"62aeb439-c242-44cc-84f5-42367747bebe\" style=\"filter: hue-rotate(180deg)\">\n      <\u002Fdiv>\n      <div class=\"misuse-cap\"><strong>Don't<\u002Fstrong>Re-colour the sun off-palette.<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- 02 COLOR -->\n<section class=\"page tinted\" id=\"color\">\n  <div class=\"inner\">\n    <div class=\"section-num\"><span>02<\u002Fspan><span>Colour<\u002Fspan><\u002Fdiv>\n    <h2 class=\"section-title\">Two colours do most of the work.<\u002Fh2>\n    <p class=\"section-lede\">Teal grounds. Sun lifts. Slate holds the page. Use one of the two brand colours as the dominant in any given layout — never both at full saturation. Off-white and Sun Light are the canvas.<\u002Fp>\n\n    <div class=\"color-hero\">\n      <div style=\"background: var(--teal); color: white\">\n        <div>\n          <div style=\"font-family: 'DM Mono', monospace; font-size: 11px; letter-spacing: 0.12em; text-transform: uppercase; opacity: 0.6\">Primary<\u002Fdiv>\n          <div class=\"ch-name\">Sola Teal<\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"ch-codes\">\n          HEX &nbsp; #1A6B5A<br>\n          RGB &nbsp; 26 / 107 / 90<br>\n          CMYK &nbsp; 84 / 35 / 64 / 27<br>\n          PMS &nbsp; 7722 C\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"background: var(--sun); color: var(--slate)\">\n        <div>\n          <div style=\"font-family: 'DM Mono', monospace; font-size: 11px; letter-spacing: 0.12em; text-transform: uppercase; opacity: 0.65\">Accent<\u002Fdiv>\n          <div class=\"ch-name\">Sola Sun<\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"ch-codes\">\n          HEX &nbsp; #F5A623<br>\n          RGB &nbsp; 245/166/35<br>\n          CMYK &nbsp; 0/40/95/0<br>\n          PMS &nbsp; 7563 C\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"background: var(--slate); color: white\">\n        <div>\n          <div style=\"font-family: 'DM Mono', monospace; font-size: 11px; letter-spacing: 0.12em; text-transform: uppercase; opacity: 0.5\">Anchor<\u002Fdiv>\n          <div class=\"ch-name\">Slate<\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"ch-codes\">\n          HEX &nbsp; #1C2B2A<br>\n          RGB &nbsp; 28/43/42<br>\n          CMYK &nbsp; 78/55/60/65<br>\n          PMS &nbsp; 5535 C\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <h3 class=\"serif\" style=\"font-size: 22px; margin-bottom: 16px; color: var(--slate-mid)\">Supporting palette<\u002Fh3>\n    <div class=\"color-row\">\n      <div class=\"color-card\">\n        <div class=\"color-swatch\" style=\"background: #2E8B73\"><\u002Fdiv>\n        <div class=\"color-meta\">\n          <div class=\"name\">Teal Mid<\u002Fdiv>\n          <div class=\"codes\"><div><span>HEX<\u002Fspan><span>#2E8B73<\u002Fspan><\u002Fdiv><div><span>USE<\u002Fspan><span>Hover, charts<\u002Fspan><\u002Fdiv><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"color-card\">\n        <div class=\"color-swatch\" style=\"background: var(--teal-light)\"><\u002Fdiv>\n        <div class=\"color-meta\">\n          <div class=\"name\">Teal Mist<\u002Fdiv>\n          <div class=\"codes\"><div><span>HEX<\u002Fspan><span>#E0F2EE<\u002Fspan><\u002Fdiv><div><span>USE<\u002Fspan><span>Calm sections, tags<\u002Fspan><\u002Fdiv><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"color-card\">\n        <div class=\"color-swatch\" style=\"background: var(--sun-light)\"><\u002Fdiv>\n        <div class=\"color-meta\">\n          <div class=\"name\">Sun Light<\u002Fdiv>\n          <div class=\"codes\"><div><span>HEX<\u002Fspan><span>#FFF3DC<\u002Fspan><\u002Fdiv><div><span>USE<\u002Fspan><span>Warm canvases<\u002Fspan><\u002Fdiv><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"color-card\">\n        <div class=\"color-swatch\" style=\"background: #D88A0F\"><\u002Fdiv>\n        <div class=\"color-meta\">\n          <div class=\"name\">Sun Dark<\u002Fdiv>\n          <div class=\"codes\"><div><span>HEX<\u002Fspan><span>#D88A0F<\u002Fspan><\u002Fdiv><div><span>USE<\u002Fspan><span>Sun on white (AA)<\u002Fspan><\u002Fdiv><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"color-card\">\n        <div class=\"color-swatch\" style=\"background: var(--off-white); border-bottom: 1px solid var(--border)\"><\u002Fdiv>\n        <div class=\"color-meta\">\n          <div class=\"name\">Off-White<\u002Fdiv>\n          <div class=\"codes\"><div><span>HEX<\u002Fspan><span>#F8F6F1<\u002Fspan><\u002Fdiv><div><span>USE<\u002Fspan><span>Default page bg<\u002Fspan><\u002Fdiv><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"color-card\">\n        <div class=\"color-swatch\" style=\"background: var(--muted)\"><\u002Fdiv>\n        <div class=\"color-meta\">\n          <div class=\"name\">Muted<\u002Fdiv>\n          <div class=\"codes\"><div><span>HEX<\u002Fspan><span>#7A8E8C<\u002Fspan><\u002Fdiv><div><span>USE<\u002Fspan><span>Body text on light<\u002Fspan><\u002Fdiv><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"h-rule\"><\u002Fdiv>\n\n    <h3 class=\"serif\" style=\"font-size: 32px; margin-bottom: 8px\">Approved pairings.<\u002Fh3>\n    <p class=\"section-lede\" style=\"margin-bottom: 32px\">These are the combinations the brand lives in. Anything outside this set should be reviewed before going out.<\u002Fp>\n\n    <div class=\"pair-row\">\n      <div class=\"pair\" style=\"background: var(--off-white); color: var(--slate)\">\n        <div class=\"pair-text\">Sun in a box.<\u002Fdiv>\n        <div class=\"pair-meta\">Off-White × Slate · Default<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"pair\" style=\"background: var(--slate); color: var(--white)\">\n        <div class=\"pair-text\">Sun in a <em style=\"color:var(--sun); font-style: italic\">box.<\u002Fem><\u002Fdiv>\n        <div class=\"pair-meta\">Slate × Sun · Hero / dark<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"pair\" style=\"background: var(--teal); color: var(--white)\">\n        <div class=\"pair-text\">Sun in a box.<\u002Fdiv>\n        <div class=\"pair-meta\">Teal × White · CTA blocks<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"pair\" style=\"background: var(--sun); color: var(--slate)\">\n        <div class=\"pair-text\">Sun in a box.<\u002Fdiv>\n        <div class=\"pair-meta\">Sun × Slate · Loud strips<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"pair\" style=\"background: var(--sun-light); color: var(--slate)\">\n        <div class=\"pair-text\">Sun in a <em style=\"color:var(--teal); font-style:italic\">box.<\u002Fem><\u002Fdiv>\n        <div class=\"pair-meta\">Sun Light × Teal · Editorial<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"pair\" style=\"background: var(--teal-light); color: var(--teal)\">\n        <div class=\"pair-text\">Sun in a box.<\u002Fdiv>\n        <div class=\"pair-meta\">Teal Mist × Teal · Quiet<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"pair\" style=\"background: var(--white); color: var(--slate); border: 1px solid var(--border)\">\n        <div class=\"pair-text\">Sun in a <em style=\"color:var(--teal); font-style:italic\">box.<\u002Fem><\u002Fdiv>\n        <div class=\"pair-meta\">White × Slate + Teal · Docs<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"pair\" style=\"background: var(--slate); color: var(--white)\">\n        <div class=\"pair-text\" style=\"color: var(--teal-light)\">Sun in a box.<\u002Fdiv>\n        <div class=\"pair-meta\">Slate × Mist · Subtle dark<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"h-rule\"><\u002Fdiv>\n\n    <h3 class=\"serif\" style=\"font-size: 22px; margin-bottom: 16px\">60 / 30 / 10 ratio<\u002Fh3>\n    <div style=\"display: grid; grid-template-columns: 6fr 3fr 1fr; height: 80px; border-radius: 12px; overflow: hidden; margin-bottom: 12px\">\n      <div style=\"background: var(--off-white); display:flex; align-items:center; justify-content:center; font-family:'DM Mono',monospace; font-size: 11px; color: var(--slate-mid); letter-spacing: 0.1em\">60% — OFF-WHITE / SLATE<\u002Fdiv>\n      <div style=\"background: var(--teal); color:white; display:flex; align-items:center; justify-content:center; font-family:'DM Mono',monospace; font-size: 11px; letter-spacing: 0.1em\">30% — TEAL<\u002Fdiv>\n      <div style=\"background: var(--sun); display:flex; align-items:center; justify-content:center; font-family:'DM Mono',monospace; font-size: 11px; letter-spacing: 0.1em\">10% — SUN<\u002Fdiv>\n    <\u002Fdiv>\n    <p style=\"font-size: 13px; color: var(--muted); max-width: 720px\">In any given layout, aim for roughly 60% neutral canvas (off-white, slate, white), 30% structural brand colour (teal), and 10% accent (sun). Sun should always feel earned — a single CTA, a single tag, a single highlight.<\u002Fp>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- 03 TYPE -->\n<section class=\"page\" id=\"type\">\n  <div class=\"section-num\"><span>03<\u002Fspan><span>Typography<\u002Fspan><\u002Fdiv>\n  <h2 class=\"section-title\">Sharp display, plain body.<\u002Fh2>\n  <p class=\"section-lede\">DM Serif Display does the talking. DM Sans does the explaining. DM Mono labels and timestamps. Never bring in a fourth.<\u002Fp>\n\n  <div class=\"type-hero\">\n    <div class=\"type-display\">Your balcony is a <em>power station.<\u002Fem><\u002Fdiv>\n    <div class=\"type-mini\">\n      <span>DM Serif Display<\u002Fspan>\n      <span>Regular &amp; Italic<\u002Fspan>\n      <span>Tracking ‑0.03em<\u002Fspan>\n      <span>Line-height 0.95–1.05<\u002Fspan>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div class=\"type-stack\">\n    <div class=\"type-card serif-card\">\n      <h4>01 — Display / Headlines<\u002Fh4>\n      <div class=\"specimen serif\">Aa <em style=\"color:var(--teal)\">Bb<\u002Fem><\u002Fdiv>\n      <div class=\"glyphs\">ABCDEFGHIJKLMNOPQRSTUVWXYZ<br>abcdefghijklmnopqrstuvwxyz<br>0123456789 — “£&amp;?!”<\u002Fdiv>\n      <div class=\"specs\">\n        <div><span>Family<\u002Fspan><span>DM Serif Display<\u002Fspan><\u002Fdiv>\n        <div><span>Weights<\u002Fspan><span>Regular · Italic<\u002Fspan><\u002Fdiv>\n        <div><span>Tracking<\u002Fspan><span>‑0.02 to ‑0.03em<\u002Fspan><\u002Fdiv>\n        <div><span>Use for<\u002Fspan><span>H1, H2, posters, hero copy<\u002Fspan><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"type-card\">\n      <h4>02 — Body / UI<\u002Fh4>\n      <div class=\"specimen sans\">Aa Bb<\u002Fdiv>\n      <div class=\"glyphs\">ABCDEFGHIJKLMNOPQRSTUVWXYZ<br>abcdefghijklmnopqrstuvwxyz<br>0123456789 — £&amp;?!<\u002Fdiv>\n      <div class=\"specs\">\n        <div><span>Family<\u002Fspan><span>DM Sans<\u002Fspan><\u002Fdiv>\n        <div><span>Weights<\u002Fspan><span>300 · 400 · 500 · 600<\u002Fspan><\u002Fdiv>\n        <div><span>Tracking<\u002Fspan><span>0 (UI) · 0.01em (body)<\u002Fspan><\u002Fdiv>\n        <div><span>Use for<\u002Fspan><span>Body, buttons, labels<\u002Fspan><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div class=\"h-rule\"><\u002Fdiv>\n\n  <h3 class=\"serif\" style=\"font-size: 32px; margin-bottom: 8px\">Type scale (web).<\u002Fh3>\n  <p class=\"section-lede\" style=\"margin-bottom: 24px\">Steps below match the production values used across <span class=\"mono\">sola.co.uk<\u002Fspan>. Print scale halves these for A4.<\u002Fp>\n\n  <table class=\"scale-table\">\n    <tbody><tr>\n      <td>Display<\u002Ftd>\n      <td><span class=\"serif\" style=\"font-size: 64px; line-height: 1\">Sun in a box.<\u002Fspan><\u002Ftd>\n      <td>DM Serif · 64–112 / 0.95<\u002Ftd>\n    <\u002Ftr>\n    <tr>\n      <td>H1<\u002Ftd>\n      <td><span class=\"serif\" style=\"font-size: 48px; line-height: 1.05\">Your balcony is a power station.<\u002Fspan><\u002Ftd>\n      <td>DM Serif · 48–58 / 1.05<\u002Ftd>\n    <\u002Ftr>\n    <tr>\n      <td>H2<\u002Ftd>\n      <td><span class=\"serif\" style=\"font-size: 34px\">Three sizes. One plug socket.<\u002Fspan><\u002Ftd>\n      <td>DM Serif · 34–42 / 1.1<\u002Ftd>\n    <\u002Ftr>\n    <tr>\n      <td>H3<\u002Ftd>\n      <td><span style=\"font-size: 22px; font-weight: 500\">Choose your kit.<\u002Fspan><\u002Ftd>\n      <td>DM Sans 500 · 22–26 / 1.2<\u002Ftd>\n    <\u002Ftr>\n    <tr>\n      <td>Lede<\u002Ftd>\n      <td><span style=\"font-size: 18px; color: var(--muted)\">Plug-in solar panels that clip to any balcony railing.<\u002Fspan><\u002Ftd>\n      <td>DM Sans 400 · 18 / 1.55<\u002Ftd>\n    <\u002Ftr>\n    <tr>\n      <td>Body<\u002Ftd>\n      <td><span style=\"font-size: 15px; color: var(--slate-mid)\">Set up in under an hour. No tools. No electrician. No drilling.<\u002Fspan><\u002Ftd>\n      <td>DM Sans 400 · 15 / 1.6<\u002Ftd>\n    <\u002Ftr>\n    <tr>\n      <td>Caption<\u002Ftd>\n      <td><span style=\"font-size: 12px; color: var(--muted)\">Estimate based on 24p/kWh UK average.<\u002Fspan><\u002Ftd>\n      <td>DM Sans 400 · 12 / 1.5<\u002Ftd>\n    <\u002Ftr>\n    <tr>\n      <td>Eyebrow<\u002Ftd>\n      <td><span class=\"mono\" style=\"font-size: 12px; color: var(--teal); letter-spacing: 0.12em; text-transform: uppercase\">Now legal in the UK<\u002Fspan><\u002Ftd>\n      <td>DM Mono · 11–12 / 1 · 0.1em<\u002Ftd>\n    <\u002Ftr>\n  <\u002Ftbody><\u002Ftable>\n<\u002Fsection>\n\n<!-- 04 VOICE -->\n<section class=\"page sun\" id=\"voice\">\n  <div class=\"inner\">\n    <div class=\"section-num\"><span>04<\u002Fspan><span>Voice &amp; tone<\u002Fspan><\u002Fdiv>\n    <h2 class=\"section-title\">Direct. Warm. A little wry.<\u002Fh2>\n    <p class=\"section-lede\">Sola talks like a 31-year-old in Bristol who's done the maths. We lead with money, follow with science, and we never lecture. We are practical. We are not preachy.<\u002Fp>\n\n    <div class=\"voice-pillars\">\n      <div class=\"pillar\">\n        <h4>Direct<\u002Fh4>\n        <p>Numbers first. Verbs second. Get to the point inside one sentence.<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"pillar\">\n        <h4>Warm<\u002Fh4>\n        <p>We're a person, not a brand. Contractions are fine. So is humour.<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"pillar\">\n        <h4>Wry<\u002Fh4>\n        <p>\"OPEC can't bill you for sunshine.\" A small smile, never a smirk.<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"pillar\">\n        <h4>Useful<\u002Fh4>\n        <p>Every piece of copy should leave the reader knowing something they didn't.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"voice-grid\">\n      <div class=\"voice-card\">\n        <h3>Lead with £, then with the planet.<\u002Fh3>\n        <p style=\"color: var(--muted); font-size: 14px\">Most people care about both, but they buy on bills. Open every piece of copy with a money number. Save the climate context for the second paragraph — it lands harder there anyway.<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"voice-card\">\n        <h3>No jargon. Ever.<\u002Fh3>\n        <p style=\"color: var(--muted); font-size: 14px\">\"Microinverter\" only earns its place if we explain what it does in the same breath. Acronyms (BSI, G98, DNO) get spelled out the first time on every page.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"h-rule\"><\u002Fdiv>\n\n    <h3 class=\"serif\" style=\"font-size: 32px; margin-bottom: 24px\">Do say / Don't say.<\u002Fh3>\n    <table class=\"do-dont-table\">\n      <thead>\n        <tr><th>Context<\u002Fth><th>Do say<\u002Fth><th>Don't say<\u002Fth><\u002Ftr>\n      <\u002Fthead>\n      <tbody>\n        <tr><td>Energy savings<\u002Ftd><td class=\"do\">Cuts your bill by £120 a year.<\u002Ftd><td class=\"dont\">Reduces your carbon footprint significantly.<\u002Ftd><\u002Ftr>\n        <tr><td>Installation<\u002Ftd><td class=\"do\">Clips to your balcony railing. Done in 45 minutes.<\u002Ftd><td class=\"dont\">Easy DIY installation process for consumers.<\u002Ftd><\u002Ftr>\n        <tr><td>Eco angle<\u002Ftd><td class=\"do\">Your fridge runs on sunshine. OPEC can't bill you for sunshine.<\u002Ftd><td class=\"dont\">Join the green energy revolution.<\u002Ftd><\u002Ftr>\n        <tr><td>BNPL<\u002Ftd><td class=\"do\">From £29/mo — you'll save more than you pay us.<\u002Ftd><td class=\"dont\">Flexible finance options available.<\u002Ftd><\u002Ftr>\n        <tr><td>Renters<\u002Ftd><td class=\"do\">Your landlord can't stop you. No drilling. No marks.<\u002Ftd><td class=\"dont\">Suitable for rental properties subject to landlord approval.<\u002Ftd><\u002Ftr>\n        <tr><td>Spec<\u002Ftd><td class=\"do\">800W — enough to run your fridge, router, and TV, free.<\u002Ftd><td class=\"dont\">800W peak output with G98-compliant microinverter.<\u002Ftd><\u002Ftr>\n      <\u002Ftbody>\n    <\u002Ftable>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- 05 ICONS -->\n<section class=\"page\" id=\"icons\">\n  <div class=\"section-num\"><span>05<\u002Fspan><span>Iconography<\u002Fspan><\u002Fdiv>\n  <h2 class=\"section-title\">Drawn with one line.<\u002Fh2>\n  <p class=\"section-lede\">All Sola icons share the same DNA: 24×24 grid, 2px stroke, round caps and joins, no fills, no expressive flourishes. Built so they sit comfortably next to the wordmark and don't compete with it.<\u002Fp>\n\n  <div class=\"icon-grid\">\n    <div class=\"icon-tile\">\n      <svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#1A6B5A\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\">\n        <circle cx=\"12\" cy=\"12\" r=\"4\"><\u002Fcircle>\n        <line x1=\"12\" y1=\"2\" x2=\"12\" y2=\"5\"><\u002Fline><line x1=\"12\" y1=\"19\" x2=\"12\" y2=\"22\"><\u002Fline>\n        <line x1=\"2\" y1=\"12\" x2=\"5\" y2=\"12\"><\u002Fline><line x1=\"19\" y1=\"12\" x2=\"22\" y2=\"12\"><\u002Fline>\n        <line x1=\"4.93\" y1=\"4.93\" x2=\"7.05\" y2=\"7.05\"><\u002Fline>\n        <line x1=\"16.95\" y1=\"16.95\" x2=\"19.07\" y2=\"19.07\"><\u002Fline>\n        <line x1=\"4.93\" y1=\"19.07\" x2=\"7.05\" y2=\"16.95\"><\u002Fline>\n        <line x1=\"16.95\" y1=\"7.05\" x2=\"19.07\" y2=\"4.93\"><\u002Fline>\n      <\u002Fsvg><span>Sun<\u002Fspan>\n    <\u002Fdiv>\n    <div class=\"icon-tile\">\n      <svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#1A6B5A\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\">\n        <rect x=\"3\" y=\"4\" width=\"18\" height=\"14\" rx=\"1\"><\u002Frect>\n        <line x1=\"3\" y1=\"9\" x2=\"21\" y2=\"9\"><\u002Fline>\n        <line x1=\"3\" y1=\"13\" x2=\"21\" y2=\"13\"><\u002Fline>\n        <line x1=\"9\" y1=\"4\" x2=\"9\" y2=\"18\"><\u002Fline>\n        <line x1=\"15\" y1=\"4\" x2=\"15\" y2=\"18\"><\u002Fline>\n      <\u002Fsvg><span>Panel<\u002Fspan>\n    <\u002Fdiv>\n    <div class=\"icon-tile\">\n      <svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#1A6B5A\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\">\n        <path d=\"M13 2 L4 14 L11 14 L11 22 L20 10 L13 10 Z\"><\u002Fpath>\n      <\u002Fsvg><span>Bolt<\u002Fspan>\n    <\u002Fdiv>\n    <div class=\"icon-tile\">\n      <svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#1A6B5A\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\">\n        <rect x=\"6\" y=\"9\" width=\"12\" height=\"13\" rx=\"1\"><\u002Frect>\n        <path d=\"M9 9 V5 a3 3 0 0 1 6 0 V9\"><\u002Fpath>\n      <\u002Fsvg><span>Plug<\u002Fspan>\n    <\u002Fdiv>\n    <div class=\"icon-tile\">\n      <svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#1A6B5A\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\">\n        <rect x=\"3\" y=\"6\" width=\"18\" height=\"12\" rx=\"1\"><\u002Frect>\n        <line x1=\"7\" y1=\"6\" x2=\"7\" y2=\"18\"><\u002Fline>\n        <line x1=\"3\" y1=\"2\" x2=\"21\" y2=\"2\"><\u002Fline>\n      <\u002Fsvg><span>Balcony<\u002Fspan>\n    <\u002Fdiv>\n    <div class=\"icon-tile\">\n      <svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#1A6B5A\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\">\n        <circle cx=\"12\" cy=\"12\" r=\"9\"><\u002Fcircle>\n        <text x=\"12\" y=\"16\" font-family=\"DM Sans\" font-size=\"9\" font-weight=\"600\" text-anchor=\"middle\" stroke=\"none\" fill=\"#1A6B5A\">£<\u002Ftext>\n      <\u002Fsvg><span>Savings<\u002Fspan>\n    <\u002Fdiv>\n    <div class=\"icon-tile\">\n      <svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#1A6B5A\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\">\n        <rect x=\"3\" y=\"9\" width=\"14\" height=\"9\" rx=\"1\"><\u002Frect>\n        <rect x=\"17\" y=\"12\" width=\"3\" height=\"3\"><\u002Frect>\n        <line x1=\"7\" y1=\"13\" x2=\"13\" y2=\"13\"><\u002Fline>\n      <\u002Fsvg><span>Battery<\u002Fspan>\n    <\u002Fdiv>\n    <div class=\"icon-tile\">\n      <svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#1A6B5A\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\">\n        <path d=\"M3 21 V11 L12 4 L21 11 V21 Z\"><\u002Fpath>\n        <line x1=\"9\" y1=\"21\" x2=\"9\" y2=\"14\"><\u002Fline>\n        <line x1=\"15\" y1=\"21\" x2=\"15\" y2=\"14\"><\u002Fline>\n      <\u002Fsvg><span>Home<\u002Fspan>\n    <\u002Fdiv>\n    <div class=\"icon-tile\">\n      <svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#1A6B5A\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\">\n        <circle cx=\"12\" cy=\"12\" r=\"9\"><\u002Fcircle>\n        <polyline points=\"12,7 12,12 15,14\"><\u002Fpolyline>\n      <\u002Fsvg><span>Time<\u002Fspan>\n    <\u002Fdiv>\n    <div class=\"icon-tile\">\n      <svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#1A6B5A\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\">\n        <path d=\"M3 17 L9 11 L13 15 L21 7\"><\u002Fpath>\n        <polyline points=\"15,7 21,7 21,13\"><\u002Fpolyline>\n      <\u002Fsvg><span>Trend<\u002Fspan>\n    <\u002Fdiv>\n    <div class=\"icon-tile\">\n      <svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#1A6B5A\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\">\n        <circle cx=\"12\" cy=\"12\" r=\"9\"><\u002Fcircle>\n        <polyline points=\"8,12 11,15 16,9\"><\u002Fpolyline>\n      <\u002Fsvg><span>Verified<\u002Fspan>\n    <\u002Fdiv>\n    <div class=\"icon-tile\">\n      <svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#1A6B5A\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\">\n        <rect x=\"3\" y=\"3\" width=\"18\" height=\"18\" rx=\"2\"><\u002Frect>\n        <line x1=\"3\" y1=\"9\" x2=\"21\" y2=\"9\"><\u002Fline>\n        <line x1=\"9\" y1=\"3\" x2=\"9\" y2=\"9\"><\u002Fline>\n      <\u002Fsvg><span>App<\u002Fspan>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <p style=\"font-size: 13px; color: var(--muted); margin-top: 32px; max-width: 720px\">The full kit lives in <span class=\"mono\" style=\"background: var(--off-white); padding: 2px 8px; border-radius: 4px\">/assets/icons/<\u002Fspan> as named SVGs. When commissioning a new icon, work in the same 24×24 grid with the same 2px stroke, no fills, and submit it stroked-only and pre-flattened.<\u002Fp>\n<\u002Fsection>\n\n<!-- 06 PATTERNS -->\n<section class=\"page tinted\" id=\"patterns\">\n  <div class=\"inner\">\n    <div class=\"section-num\"><span>06<\u002Fspan><span>Patterns &amp; texture<\u002Fspan><\u002Fdiv>\n    <h2 class=\"section-title\">Patterns are quiet — until they're not.<\u002Fh2>\n    <p class=\"section-lede\">Three patterns extend the brand into backgrounds and full-bleed imagery. Use them sparingly: one pattern per surface, never as a backdrop for body copy.<\u002Fp>\n\n    <div class=\"pattern-row\">\n      <div>\n        <div class=\"pattern-tile\" style=\"background-image: url(&quot;83b05580-a00d-4c4a-afe7-e8888145e236&quot;); background-color: var(--sun-light)\"><\u002Fdiv>\n        <div class=\"demo-cap\" style=\"margin-top: 12px\"><strong>Rays<\u002Fstrong><span>For warm lifestyle headers<\u002Fspan><\u002Fdiv>\n      <\u002Fdiv>\n      <div>\n        <div class=\"pattern-tile\" style=\"background-image: url(&quot;d32b4ac3-9e6f-4784-a6dc-342490b4dd4d&quot;); background-color: var(--slate)\"><\u002Fdiv>\n        <div class=\"demo-cap\" style=\"margin-top: 12px\"><strong>Panel grid<\u002Fstrong><span>For technical / product<\u002Fspan><\u002Fdiv>\n      <\u002Fdiv>\n      <div>\n        <div class=\"pattern-tile\" style=\"background-image: url(&quot;38f6df27-c67b-4401-90bc-de6d8d626837&quot;); background-color: var(--teal-light)\"><\u002Fdiv>\n        <div class=\"demo-cap\" style=\"margin-top: 12px\"><strong>Tiles<\u002Fstrong><span>For social, carousels, decks<\u002Fspan><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- 07 BADGES -->\n<section class=\"page\" id=\"badges\">\n  <div class=\"section-num\"><span>07<\u002Fspan><span>Trust badges<\u002Fspan><\u002Fdiv>\n  <h2 class=\"section-title\">Proof, in three formats.<\u002Fh2>\n  <p class=\"section-lede\">A small, consistent set of badges for landing pages, email footers and product packaging. Always use as a horizontal row; never as a tower.<\u002Fp>\n\n  <div class=\"badge-row\">\n    <div class=\"badge-display\">\n      <img src=\"c364752f-2d9b-44e1-a0ab-6353a5acaba5\" alt=\"BSI Certified\">\n      <div class=\"label\">badge-bsi.svg<\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"badge-display\">\n      <img src=\"a5316fbf-d72a-45ac-92cc-9c89ff904e15\" alt=\"0% VAT\">\n      <div class=\"label\">badge-vat.svg<\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"badge-display\">\n      <img src=\"c6775134-6510-4be9-8b26-db0da2529f9e\" alt=\"10 year warranty\">\n      <div class=\"label\">badge-warranty.svg<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- 08 APPLICATIONS -->\n<section class=\"page tinted\" id=\"applications\">\n  <div class=\"inner\">\n    <div class=\"section-num\"><span>08<\u002Fspan><span>Applications<\u002Fspan><\u002Fdiv>\n    <h2 class=\"section-title\">In the wild.<\u002Fh2>\n    <p class=\"section-lede\">A small set of mocks showing how the system holds together across web, social, print and email. Use these as templates — match the rhythm, not just the colours.<\u002Fp>\n\n    <div class=\"apps-grid\">\n      <!-- business card -->\n      <div class=\"app-card\">\n        <div class=\"bizcard\">\n          <div style=\"display:flex; gap:16px; transform: rotate(-3deg)\">\n            <div class=\"bc front\">\n              <div class=\"bc-top\"><img src=\"b614945d-f0fd-49aa-a363-e87d08ec75f9\" alt=\"\"><span>Sola<\u002Fspan><\u002Fdiv>\n              <div>\n                <div class=\"bc-name\">Maya Reeves<\u002Fdiv>\n                <div class=\"bc-role\">Head of customer love<\u002Fdiv>\n              <\u002Fdiv>\n              <div class=\"bc-contact\">\n                maya@sola.co.uk<br>\n                +44 (0)20 7946 0118\n              <\u002Fdiv>\n            <\u002Fdiv>\n            <div class=\"bc back\" style=\"transform: rotate(6deg)\">\n              <div class=\"bc-top\"><\u002Fdiv>\n              <div class=\"bc-tag\">Sun in a <em>box.<\u002Fem><\u002Fdiv>\n              <div class=\"bc-contact\">sola.co.uk<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"app-cap\"><strong>Business card<\u002Fstrong><span>85 × 55mm · 2-side<\u002Fspan><\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- ig post -->\n      <div class=\"app-card\">\n        <div class=\"ig-mock\">\n          <div class=\"ig-frame\">\n            <div class=\"ig-top\">— Now legal in the UK<\u002Fdiv>\n            <div class=\"ig-headline\">Your balcony is a <em>power station.<\u002Fem><\u002Fdiv>\n            <div class=\"ig-bottom\">\n              <img src=\"62aeb439-c242-44cc-84f5-42367747bebe\" alt=\"\">\n              <div class=\"ig-handle\">@sola.uk<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"app-cap\"><strong>Instagram post<\u002Fstrong><span>1080 × 1350 · 4:5<\u002Fspan><\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- poster -->\n      <div class=\"app-card\">\n        <div class=\"poster-mock\">\n          <div class=\"poster\">\n            <div class=\"poster-sun\"><\u002Fdiv>\n            <div class=\"poster-content\">\n              <h3>Sun in a <em>box.<\u002Fem><\u002Fh3>\n              <p style=\"font-size: 13px; color: var(--slate-mid); margin-top: 12px; line-height: 1.5\">Plug-in solar that clips to your balcony railing. No tools. No electrician.<\u002Fp>\n            <\u002Fdiv>\n            <div class=\"poster-foot\">\n              <img src=\"62aeb439-c242-44cc-84f5-42367747bebe\" alt=\"\">\n              <div class=\"price\">£29<small>/mo<\u002Fsmall><\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"app-cap\"><strong>Tube poster<\u002Fstrong><span>A2 vertical · OOH<\u002Fspan><\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- email -->\n      <div class=\"app-card\">\n        <div class=\"email-mock\">\n          <div class=\"email-frame\">\n            <div class=\"email-header\">\n              <img src=\"b614945d-f0fd-49aa-a363-e87d08ec75f9\" alt=\"\">\n              <span>Sola<\u002Fspan>\n            <\u002Fdiv>\n            <div class=\"email-body\">\n              <h4>How much did your <em>solar<\u002Fem> save this week?<\u002Fh4>\n              <p>Open the app to see your generation since Monday. At your current rate, you're on track to save about £132 this year.<\u002Fp>\n              <a class=\"email-cta\">View my savings →<\u002Fa>\n            <\u002Fdiv>\n            <div class=\"email-foot\">SOLA LTD · LONDON · UNSUBSCRIBE<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"app-cap\"><strong>Lifecycle email<\u002Fstrong><span>Day 7 · Klaviyo template<\u002Fspan><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- FOOTER -->\n<footer class=\"brand-footer\">\n  <div class=\"brand-footer-inner\">\n    <div class=\"footer-tagline\">\"Sun in a <em>box.<\u002F
